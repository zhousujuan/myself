<!doctype html>
<html lang="zh-CN">
  <head>

      content="sujuan 的个人知识库：职业、创作、才艺、游戏的知识汇总，方便自己查找学习，也欢迎你来一起学。"
    />
    <title>知识库 | sujuan</title>
    <link rel="stylesheet" href="src/home.css?v=20260519-advantage" />
    <link rel="stylesheet" href="src/knowledge.css?v=20260530b" />
  </head>
  <body>
    <canvas id="particleField" class="particle-field" aria-hidden="true"></canvas>
    <div class="site-shell">
      <header class="topbar" aria-label="站点导航">
        <a class="brand" href="index.html" aria-label="返回首页">
          <span class="brand-mark" aria-hidden="true">ZS</span>
          <span>sujuan AI product portfolio</span>
        </a>
        <nav class="nav-links" aria-label="主要入口">
          <a href="index.html">知识库</a>
          <a href="capability.html">能力矩阵</a>
          <a href="evidence.html">项目证据</a>
          <a href="resume.html">完整简历</a>
        </nav>
      </header>

      <main class="page-main">
        <section class="k-intro" aria-labelledby="kTitle">
          <p class="eyebrow">My knowledge base</p>
          <h1 id="kTitle">我的知识库</h1>
          <p>
            记录我在学和已经沉淀下来的东西——职业、创作、才艺、游戏都在这儿。
            方便我自己随时查找学习，也欢迎你顺着感兴趣的主题一起学。
          </p>
        </section>

        <div class="k-toolbar" role="search">
          <div class="k-search-row">
            <input
              id="kSearch"
              class="k-search"
              type="search"
              placeholder="搜索知识、标签…（如：外贸、古筝、剪辑）"
              aria-label="搜索知识"
            />
            <span id="kCount" class="k-count">—</span>
          </div>
          <div id="kCatBar" class="k-filter-row" aria-label="按分类筛选"></div>
          <div id="kStatusBar" class="k-filter-row" aria-label="按状态筛选"></div>
        </div>

        <div id="kResults" aria-live="polite"></div>
        <p id="kEmpty" class="k-empty" hidden>没有匹配的知识，换个关键词或清掉筛选试试。</p>
      </main>

      <footer class="site-footer">
        <span>© 2026 sujuan</span>
        <span>个人知识库 · 边学边沉淀</span>
      </footer>
    </div>
    <script src="src/home-particles.js?v=20260518" defer></script>
